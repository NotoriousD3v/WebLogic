        /* ============================================

        /* ============================================

        .orb {

        .orb-2 {

        }

        .orb-3 {

            height: 400px;

        /* ============================================

        .glass-card {

        .glass-card::before {

        .reveal {

        }

        .reveal.revealed {
            opacity: 1;

        .reveal-delay-1 { transition-delay: 0.1s; }
